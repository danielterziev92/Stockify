spring:
  application:
    name: catalog
  datasource:
    url: jdbc:postgresql://localhost:5432/catalog
    username: postgres
    password: P@ssword1
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  data:
    web:
      pageable:
        one-indexed-parameters: true
        max-page-size: 100
  threads:
    virtual:
      enabled: true
  mvc:
    apiversion:
      supported: "1.0, 2.0"
      default: "1.0"
      use:
        header: "X-API-Version"
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  graphql:
    http:
      path: /graphql
    graphiql:
      enabled: true
      path: /graphiql
    schema:
      locations: classpath:graphql/**/
      file-extensions: .graphqls,.gqls

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html