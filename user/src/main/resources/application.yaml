app:
  jwt:
    private-key-path: classpath:certs/private.pem
    access-token-expiry: 900      # 15 minutes in seconds
    refresh-token-expiry: 2592000 # 30 days in seconds
  verification:
    code-expiry: 3600             # 1 hour in seconds
    redirect-url: http://localhost:3000/verify
  grpc:
    port: 9091

jwt:
  private-key-location: classpath:certs/private.pem
  expiration-hours: 24
  issuer: stockify-auth

logging:
  level:
    org.springframework.jdbc.core: TRACE
    org.jooq: DEBUG
    org.jooq.tools.LoggerListener: DEBUG
    com.stockify.catalog: DEBUG
    io.grpc: DEBUG
  file:
    name: user/logs/error.log
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"